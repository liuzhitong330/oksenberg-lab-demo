<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg"
     style="font-family:-apple-system,system-ui,sans-serif;background:white;">
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#222">
    Two Genetic Programs in MS: Susceptibility vs. Severity
  </text>
  <text x="350" y="40" text-anchor="middle" font-size="10" fill="#666">
    Immune genetics (HLA) determines who gets MS; CNS genetics (DYSF-ZNF638) determines how fast it progresses
  </text>
  <text x="340" y="64" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="700">
    Susceptibility track (immune)
  </text>
  <text x="340" y="194" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">
    Severity track (CNS resilience)
  </text>
  <rect x="45" y="66" width="130" height="48" rx="6" fill="#2980b9" opacity="0.1"/><rect x="45" y="66" width="130" height="48" rx="6" fill="none" stroke="#2980b9" stroke-width="1.5"/><text x="110" y="83" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2980b9">HLA-DRB1*15:01</text><text x="110" y="97" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2980b9">+ 200 SNPs</text><text x="110" y="128" text-anchor="middle" font-size="8" fill="#888">immune susceptibility</text><line x1="175.0" y1="90.0" x2="257.0" y2="90.0" stroke="#2980b9" stroke-width="1.8" /><polygon points="265.0,90.0 257.0,94.0 257.0,86.0" fill="#2980b9"/><rect x="275" y="66" width="130" height="48" rx="6" fill="#2980b9" opacity="0.1"/><rect x="275" y="66" width="130" height="48" rx="6" fill="none" stroke="#2980b9" stroke-width="1.5"/><text x="340" y="83" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2980b9">CNS immune</text><text x="340" y="97" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2980b9">attack</text><text x="340" y="128" text-anchor="middle" font-size="8" fill="#888">demyelination / lesion</text><line x1="405.0" y1="90.0" x2="487.0" y2="90.0" stroke="#2980b9" stroke-width="1.8" /><polygon points="495.0,90.0 487.0,94.0 487.0,86.0" fill="#2980b9"/><rect x="510" y="66" width="130" height="48" rx="6" fill="#2980b9" opacity="0.1"/><rect x="510" y="66" width="130" height="48" rx="6" fill="none" stroke="#2980b9" stroke-width="1.5"/><text x="575" y="83" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2980b9">Lesion</text><text x="575" y="97" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2980b9">location</text><text x="575" y="128" text-anchor="middle" font-size="8" fill="#888">determines symptoms</text><rect x="45" y="196" width="130" height="48" rx="6" fill="#c0392b" opacity="0.1"/><rect x="45" y="196" width="130" height="48" rx="6" fill="none" stroke="#c0392b" stroke-width="1.5"/><text x="110" y="213" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">DYSF-ZNF638</text><text x="110" y="227" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">locus</text><text x="110" y="258" text-anchor="middle" font-size="8" fill="#888">rs10191329 (Nature 2023)</text><line x1="175.0" y1="220.0" x2="257.0" y2="220.0" stroke="#c0392b" stroke-width="1.8" /><polygon points="265.0,220.0 257.0,224.0 257.0,216.0" fill="#c0392b"/><rect x="275" y="196" width="130" height="48" rx="6" fill="#c0392b" opacity="0.1"/><rect x="275" y="196" width="130" height="48" rx="6" fill="none" stroke="#c0392b" stroke-width="1.5"/><text x="340" y="213" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">CNS membrane</text><text x="340" y="227" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">resilience</text><text x="340" y="258" text-anchor="middle" font-size="8" fill="#888">repair capacity after damage</text><line x1="405.0" y1="220.0" x2="487.0" y2="220.0" stroke="#c0392b" stroke-width="1.8" /><polygon points="495.0,220.0 487.0,224.0 487.0,216.0" fill="#c0392b"/><rect x="510" y="196" width="130" height="48" rx="6" fill="#c0392b" opacity="0.1"/><rect x="510" y="196" width="130" height="48" rx="6" fill="none" stroke="#c0392b" stroke-width="1.5"/><text x="575" y="213" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">Disability</text><text x="575" y="227" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c0392b">accumulation</text><text x="575" y="258" text-anchor="middle" font-size="8" fill="#888">−3.7 yr to walking aid
in risk allele homozygotes</text><line x1="340.0" y1="114.0" x2="340.0" y2="188.0" stroke="#7f8c8d" stroke-width="1.8" stroke-dasharray="5,3"/><polygon points="340.0,196.0 336.0,188.0 344.0,188.0" fill="#7f8c8d"/><text x="340" y="159" text-anchor="middle" font-size="8.5" fill="#7f8c8d">regional</text><text x="340" y="171" text-anchor="middle" font-size="8.5" fill="#7f8c8d">expression</text><rect x="170" y="260" width="340" height="40" rx="4" fill="#fff8f0" stroke="#e67e22" stroke-width="1.2"/><text x="340" y="275" text-anchor="middle" font-size="9.5" fill="#e67e22" font-weight="700">Regional myelin-to-BDNF balance</text><text x="340" y="290" text-anchor="middle" font-size="8.5" fill="#555">Cereb (41×) · BS (29×) · Thal (16×) — high myelin load, low neuroprotective reserve</text><rect x="30" y="325" width="640" height="42" rx="4" fill="#fff5f5" stroke="#c0392b" stroke-width="1.2"/><text x="350" y="339" text-anchor="middle" font-size="9.5" fill="#c0392b" font-weight="700">IMSGC / Oksenberg lab key finding (Nature 2023):</text><text x="350" y="353" text-anchor="middle" font-size="8.5" fill="#444">DYSF-ZNF638 is the first MS severity locus — heritability enriched in CNS tissue, not immune tissue.</text><text x="350" y="365" text-anchor="middle" font-size="8.5" fill="#444">Risk allele (rs10191329) shortens median time to walking aid by 3.7 years in homozygous carriers.</text>
  <text x="350" y="376" text-anchor="middle" font-size="8.5" fill="#aaa">
    International Multiple Sclerosis Genetics Consortium (2023) Nature 619:323–331 · Oksenberg lab, UCSF
  </text>
</svg>